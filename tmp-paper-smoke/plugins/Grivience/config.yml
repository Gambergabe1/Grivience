end-mines:
  # THE END - MINES EXPANSION (v0.2)
  # A late-game mining zone hosted in a separate void End world.
  enabled: true
  world-name: skyblock_end_mines
  required-level: 25
  
  access:
    # If true, only server operators can enter End Mines (via /endmine or Fast Travel).
    operator-only: false
  
  # Spawn point for /endmine and fast travel.
  spawn:
    x: 0.5
    y: 80.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  
  # Automatically generate the End Mines layout the first time the world loads.
  auto-generate: true
  generated: true
  
  generation:
    blocks-per-tick: 2500
    radius: 48
    min-y: 60
    max-y: 78
    seed: 0
  
  mining:
    regen:
      enabled: true
      delay-ticks: 60
  
  mobs:
    enabled: true
    # Spawn behavior:
    # - around_players: dynamic spawns near players (default)
    # - spawn_points: only spawn from configured /endmine mobs spawn points
    # - mixed: both around_players + spawn_points
    spawn-mode: around_players
    spawn-interval-ticks: 40
    spawn-radius: 28
    max-near-player: 12
    despawn-distance: 72
    safe-radius-from-spawn: 12
    spawn-attempts: 10
  
  protection:
    # Blocks allowed to be mined in End Mines (all other blocks are protected).
    mineable-blocks:
    - END_STONE
    - END_STONE_BRICKS
    - PURPUR_BLOCK
    - PURPUR_PILLAR
    - OBSIDIAN
    - CRYING_OBSIDIAN
    - AMETHYST_BLOCK
    - BUDDING_AMETHYST
    - CHORUS_PLANT
    - CHORUS_FLOWER

