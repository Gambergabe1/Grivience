bazaar:
  # ==================== MAIN SETTINGS ====================
  enabled: true
  use-vault-economy: true
  allow-level-fallback: true
  
  # ==================== ORDER LIMITS (Skyblock-accurate) ====================
  # Maximum orders per player
  max-orders-per-player: 50
  
  # Order expiry time in hours (standard: 36 hours)
  order-expiry-hours: 36
  
  # 6-second cancellation window for instant full refund
  cancellation-window-seconds: 6
  
  # ==================== PRICE CONSTRAINTS ====================
  # Minimum order value in coins (standard: 7 coins)
  min-order-value: 7.0
  
  # Maximum price spread percentage (standard: 5%)
  # Orders cannot be placed more than this % away from market price
  max-price-spread-percent: 5.0
  
  # ==================== INSTANT TRADE SETTINGS ====================
  # Default sell multiplier (0.6 = 60% of buy price for instant sell)
  default-sell-multiplier: 0.6
  
  # Instant buy premium (1.05 = 5% above highest buy order)
  instant-buy-premium: 1.05
  
  # Instant sell discount (0.95 = 5% below lowest sell order)
  instant-sell-discount: 0.95
  
  # ==================== FEES AND TAXES (Optional) ====================
  # Transaction fee percentage (0 = disabled, standard: 2%)
  transaction-fee-percent: 0.0
  
  # Instant sell tax percentage (0 = disabled, standard: 1.5%)
  instant-sell-tax-percent: 0.0
  
  # ==================== STACK SIZE LIMITS ====================
  # Maximum amount per order (standard: 1792 = 28 stacks)
  max-order-amount: 1792
  
  # Skyblock-style stack size tiers
  # Players can only order in these quantities
  stack-size-tiers:
  - 64
  - 160
  - 256
  - 512
  - 1024
  - 1792
  
  # ==================== DEFAULT PRICES ====================
  # Fallback prices when no orders exist
  default-prices:
    vanilla-buy: 32.0
    vanilla-sell: 19.2 # 60% of buy
    custom-buy: 5000.0
    custom-sell: 3000.0
  
  # ==================== PRICE OVERRIDES ====================
  # Override prices for specific materials
  material-price-overrides:
    DIAMOND: 120.0
    EMERALD: 96.0
    NETHERITE_INGOT: 900.0
    NETHER_STAR: 1600.0
    DRAGON_EGG: 8000.0
    ELYTRA: 5000.0
    TOTEM_OF_UNDYING: 2500.0
  
  material-sell-overrides: {}
  
  # Override prices for custom items
  custom-price-overrides:
    flying_raijin: 250000.0
    armor_shogun_helmet: 45000.0
    armor_shogun_chestplate: 60000.0
  
  custom-sell-overrides: {}
  
  # ==================== GUI SETTINGS ====================
  gui:
    # Main menu rows (54 = 6 rows)
    main-menu-rows: 6
    
    # Category menu rows
    category-menu-rows: 6
    
    # Product menu rows
    product-menu-rows: 6
    
    # Orders menu rows
    orders-menu-rows: 6
    
    # Shopping bag menu rows
    bag-menu-rows: 6
    
    # Use custom heads for category icons
    use-custom-heads: true
    
    # Show price history graph in product menu
    show-price-history: true
    
    # Price history duration in hours
    price-history-hours: 24
  
  # ==================== NOTIFICATION SETTINGS ====================
  notifications:
    # Notify when order is fully/partially filled
    notify-on-fill: true
    
    # Notify when order is about to expire (in minutes)
    notify-expiry-warning: 60
    
    # Notify when shopping bag has items to claim
    notify-bag-claim: true
    
    # Sound played on notifications
    notification-sound: ENTITY_PLAYER_LEVELUP
    notification-volume: 0.5
    notification-pitch: 1.0
  
  # ==================== DATABASE SETTINGS ====================
  # Database type: SQLITE or MYSQL
  database-type: SQLITE
  
  # MySQL settings (only used if database-type is MYSQL)
  mysql:
    host: localhost
    port: 3306
    database: bazaar
    username: root
    password: ''
    ssl: false
    auto-reconnect: true
  
  # ==================== ADVANCED SETTINGS ====================
  advanced:
    # Update market prices every X seconds
    market-update-interval: 5
    
    # Cleanup expired orders every X minutes
    cleanup-interval-minutes: 10
    
    # Maximum price history entries per product
    max-price-history-entries: 500
    
    # Enable cross-server sync (requires Redis/BungeeCord)
    cross-server-sync: false
    
    # Enable 2FA confirmation for expensive trades (over X coins)
    expensive-trade-confirmation: 100000.0
    
    # Enable order matching engine logging
    debug-matching: false

# ==================== ZONE EDITOR ====================
# Zone system for defining areas that display on scoreboard
zones:
  # Enable/disable zone system
  enabled: true
  
  # Default zone name when player is not in any defined zone
  default-zone-name: Overworld
  
  # Show zone name in scoreboard
  show-in-scoreboard: true
  
  # Show zone change message when player enters/leaves a zone
  show-on-join: true
  
  # Update zone display when player moves between zones
  update-on-change: true
  
  # Scoreboard update interval in ticks (20 ticks = 1 second)
  scoreboard-update-interval: 20
  
  # Zone priority order for scoreboard display
  # Higher priority zones override lower ones
  # Dungeon sessions always have highest priority
  priority-order:
  - dungeon
  - zone
  - island
  - world

# ==================== GRAPPLING HOOK ====================
# Grappling hook system - Skyblock-accurate
grappling-hook:
  # Enable/disable grappling hook
  enabled: true
  
  # Launch velocity (standard: 2.0)
  launch-velocity: 2.0
  
  # Maximum distance in blocks (standard: ~50)
  max-distance: 50.0
  
  # Cooldown in milliseconds (standard: 2000ms = 2s)
  cooldown-ms: 2000
  
  # Pull force multiplier (standard: 0.8)
  pull-force: 0.8
  
  # Cancel hook when sneaking
  cancel-on-sneak: true
  
  # Cancel hook when right-clicking again
  cancel-on-right-click: true
  
  # Show particle effects (standard: CRIT + CLOUD)
  particle-effects: true
  
  # Play sound effects
  sound-effects: true
  
  # Item settings
  item:
    # Custom model data for texture pack
    custom-model-data: 1001
    # Make item unbreakable (accurate)
    unbreakable: true
    # No durability consumption
    consume-durability: false

# ==================== STAFFS ====================
# Staff system with protections
staffs:
  # Enable/disable staff system
  enabled: true
  
  # Global cooldown between staff ability uses (milliseconds)
  global-cooldown-ms: 500
  
  # Require mana for staff abilities
  require-mana: true
  
  # Show cooldown messages to players
  show-cooldown-messages: true
  
  # Staff ability damage multiplier (scales with intelligence)
  intelligence-scaling: 1.5
  
  # Staff-specific settings
  types:
    arcane:
      name: '&5Arcane Staff'
      mana-cost: 50
      damage: 100
      cooldown-ms: 1000
    frostbite:
      name: '&bFrostbite Staff'
      mana-cost: 75
      damage: 120
      cooldown-ms: 2000
      effect: FREEZE
    inferno:
      name: '&cInferno Staff'
      mana-cost: 100
      damage: 150
      cooldown-ms: 3000
      effect: FIRE
    stormcaller:
      name: '&eStormcaller Staff'
      mana-cost: 80
      damage: 110
      cooldown-ms: 2500
      effect: LIGHTNING
    voidwalker:
      name: '&5Voidwalker Staff'
      mana-cost: 60
      damage: 90
      cooldown-ms: 1500
      effect: TELEPORT
    celestial:
      name: '&fCelestial Staff'
      mana-cost: 90
      damage: 130
      cooldown-ms: 2000
      effect: HEAL

# ==================== SKYBLOCK PROFILES ====================
# Skyblock-accurate profile system
skyblock-profiles:
  # Enable profile system
  enabled: true
  
  # Maximum profiles per player (standard: 5)
  max-profiles: 5
  
  # Allow profile deletion
  allow-deletion: true
  
  # Auto-save interval in seconds
  auto-save-interval-seconds: 300

# ==================== MINING EVENTS ====================
mining-events:
  kings-inspection:
    # ZNPCs configuration for King's Inspection
    npc:
      name: '&6&lKing Ironcrest'
      # Spawn location at the Surface of Mines
      location:
        world: Minehub
        x: 10.5
        y: 100.0
        z: 10.5
        yaw: 180.0
        pitch: 0.0
      # NPC Skin (optional, standard is King)
      skin: King
  
  # Profile-specific settings
  settings:
    # Share cosmetics across profiles
    share-cosmetics: false
    # Share achievements across profiles
    share-achievements: true
    # Share collection unlocks across profiles
    share-collections: false

# ==================== WELCOME EVENT ====================
# Hard Hat Harry - Starter Guide & Rewards
welcome-event:
  # Enable welcome event system
  enabled: true
  
  # Starter money (balanced for economy)
  starter-money: 500.0
  
  # Mining XP boost percentage
  mining-boost-percent: 15.0
  
  # Farming XP boost percentage
  farming-boost-percent: 15.0
  
  # Boost duration in minutes
  boost-duration-minutes: 45
  
  # NPC spawn location (near island creation portal)
  spawn-world: world
  spawn-x: 0.5
  spawn-y: 100.0
  spawn-z: 0.5
  spawn-yaw: 0.0
  spawn-pitch: 0.0
  
  # Starter armor (optional - set to false to disable)
  give-starter-armor: true
  
  # Starter tools (optional - set to false to disable)
  give-starter-tools: true

