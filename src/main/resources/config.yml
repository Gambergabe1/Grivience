# ==================== SKYBLOCK PROFILES ====================
# Skyblock-accurate profile system
skyblock-profiles:
  # Enable profile system
  enabled: true

  # Maximum profiles per player (standard: 5)
  # Ranks can increase this limit via permissions:
  # - grivience.profiles.limit.vip: 2
  # - grivience.profiles.limit.vipplus: 2
  # - grivience.profiles.limit.vipplusplus: 3
  # - grivience.profiles.limit.mvp: 4
