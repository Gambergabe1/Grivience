resource-pack:
  enabled: true
  required: true
  url: ""             # If empty, the built-in local server will host the zip below.
  hash: ""            # Optional SHA-1 of the zip; auto-computed when local hosting.
  prompt: "&eThis pack enables custom item textures. Accept?"
  local:
    enabled: true
    file: "resource-pack.zip"   # Place your pack zip in plugins/Grivience/resource-pack.zip
    host: "localhost"
    port: 8765

jump-pads:
  # Hypixel-like baseline: snappy horizontal carry with a clear upward pop.
  horizontal-velocity: 2.20
  vertical-boost: 1.04
  arrival-teleport-delay-ticks: 15
  midpoint-teleport-ratio: 0.50
  arrival-y-offset: 0.15
  cooldown-ms: 450
  fall-cancel-window-ms: 3000
  hypixel-effects: true
  min-vertical-speed: 0.58
  max-vertical-speed: 1.42
  max-horizontal-speed: 3.85
  post-teleport-horizontal-speed: 0.0
  post-teleport-vertical-speed: 0.10
  post-teleport-lock-ticks: 6
  cross-world-preview-distance: 8.0
  cross-world-preview-rise: 3.0

# Storage System Configuration
# Skyblock-style storage with multiple types and upgrades
storage:
  # Enable the storage system
  enabled: true
  
  # Auto-save settings
  auto-save:
    enabled: true
    interval-ticks: 600  # 30 seconds
  
  # Storage locking feature
  allow-locking: true
  
  # Custom naming of storage
  allow-naming: true
  
  # Usage warning threshold (percentage)
  usage-warning-threshold: 90
  
  # Enable storage leaderboard
  enable-leaderboard: true
  
  # Enable upgrade notifications
  enable-upgrade-notifications: true
  
  # Permission settings
  permissions:
    # Default permissions for all players
    default:
      - storage.personal
      - storage.ender
    # VIP permissions
    vip:
      - storage.vault
      - storage.backpack
    # MVP permissions
    mvp:
      - storage.warehouse

mob-settings:
  disable-natural-bat-spawns: true

farming-contests:
  enabled: true
  minimum-farming-level: 10
  minimum-collection-increase: 100
  schedule:
    interval-minutes: 90
    duration-minutes: 20
    offset-minutes: 0
    seed: 91451
  crop-pool:
    - "wheat"
    - "carrot"
    - "potato"
    - "nether_wart"
    - "sugar_cane"
    - "cactus"
    - "cocoa_beans"
    - "melon"
    - "pumpkin"
    - "mushroom"
