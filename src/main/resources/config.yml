end-mines:
  # THE END - MINES EXPANSION (v0.2)
  # A late-game mining zone hosted in a separate void End world.
  enabled: true
  world-name: "skyblock_end_mines"
  required-level: 25

  access:
    # If true, only server operators can enter End Mines (via /endmine or Fast Travel).
    operator-only: false

  # Spawn point for /endmine and fast travel.
  spawn:
    x: 0.5
    y: 80.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

  # Automatically generate the End Mines layout the first time the world loads.
  auto-generate: true
  generated: false

  generation:
    blocks-per-tick: 2500
    radius: 48
    min-y: 60
    max-y: 78
    seed: 0

  mining:
    regen:
      enabled: true
      delay-ticks: 60
      placeholder-block: BEDROCK
    tool-requirements:
      enabled: true
      end-stone-breaking-power: 3
      obsidian-breaking-power: 6
      crystal-breaking-power: 7
    crystal-nodes:
      amethyst-hits: 3
      budding-hits: 4
      hit-reset-ms: 4000
      regen-delay-ticks: 180
      placeholder-block: BEDROCK
      reward-multiplier: 2

  heart:
    enabled: true
    starting-level: 1
    starting-tokens: 1
    tokens-per-level: 1
    tier-token-rewards: [0, 1, 2, 2, 2, 2, 2, 3, 2, 2, 2]
    auto-save-interval-seconds: 300
    level-thresholds: [0, 75, 225, 525, 975, 1700, 2800, 4400, 6650, 9750]
    rewards:
      end-mine-xp: 1
      end-mine-dust-min: 1
      end-mine-dust-max: 2
      kunzite-xp: 8
      kunzite-dust-min: 2
      kunzite-dust-max: 4

  convergence:
    enabled: true
    cooldown-seconds: 3600
    altar-radius: 4.5
    altar:
      # Set with: /endmine convergence setaltar
      world: ""
      x: 0.5
      y: 80.0
      z: 0.5
      yaw: 0.0
      pitch: 0.0
      material: RESPAWN_ANCHOR
    hologram:
      enabled: true
      refresh-ticks: 40
      base-height: 2.25
      line-spacing: 0.28
    heart-xp-reward: 60
    heart-dust-reward: 25
    reward-draws: 3
    required-item-ids:
      - KUNZITE
      - RIFT_ESSENCE
      - VOID_CRYSTAL
      - OBSIDIAN_CORE
      - CHORUS_WEAVE
    reward-pool:
      - ORE_FRAGMENT:48:96:32
      - ENDSTONE_SHARD:24:48:24
      - KUNZITE:2:6:10
      - RIFT_ESSENCE:2:5:8
      - VOID_CRYSTAL:2:5:8
      - OBSIDIAN_CORE:2:5:8
      - CHORUS_WEAVE:2:5:8
      - VOLTA:1:2:7
      - OIL_BARREL:1:1:3
      - MITHRIL_ENGINE:1:1:1
      - MEDIUM_FUEL_TANK:1:1:1

  mobs:
    enabled: true
    # Spawn behavior:
    # - around_players: dynamic spawns near players (default)
    # - spawn_points: only spawn from configured /endmine mobs spawn points
    # - mixed: both around_players + spawn_points
    spawn-mode: "around_players"
    spawn-interval-ticks: 40
    spawn-radius: 28
    max-near-player: 12
    global-max: 120
    despawn-distance: 72
    safe-radius-from-spawn: 12
    activation-safe-radius-from-spawn: 40
    spawn-attempts: 10
    # Multiplies End Mines mob melee damage.
    damage-multiplier: 1.25
    proximity-upgrade:
      enabled: true
      radius: 7.5
      level: 15
      health-multiplier: 1.75
      damage-multiplier: 1.35
      speed-multiplier: 1.06
      armor-bonus: 8.0
      eligible-types:
        - riftwalker
        - enderman_excavator
        - crystal_sentry

  protection:
    # Blocks allowed to be mined in End Mines (all other blocks are protected).
    mineable-blocks:
      - END_STONE
      - END_STONE_BRICKS
      - PURPUR_BLOCK
      - PURPUR_PILLAR
      - OBSIDIAN
      - CRYING_OBSIDIAN
      - AMETHYST_BLOCK
      - BUDDING_AMETHYST
      - CHORUS_PLANT
      - CHORUS_FLOWER

