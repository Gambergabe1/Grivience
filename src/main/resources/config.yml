      60: 7000000
  
  # Skyblock XP rewards for leveling up skills (Skyblock-accurate)
  # Level 1-10: +5 XP, Level 11-25: +10 XP, Level 26-50: +20 XP, Level 51-60: +30 XP
  skill-level-xp-rewards:
    level-1-to-10: 5
    level-11-to-25: 10
    level-26-to-50: 20
    level-51-to-60: 30
  
  # Catacombs leveling (Skyblock-accurate)
  # Level 1-39: +20 XP per level, Level 40-50: +40 XP per level
  dungeons:
    catacombs-level-xp-rewards:
      level-1-to-39: 20
      level-40-to-50: 40
    class-level-xp-reward: 4  # +4 XP per class level (all 5 classes)
    catacombs-level-cap: 50
    class-level-cap: 50
    # Pseudo leveling based on completed runs (not Catacombs XP)
    catacombs-runs-per-level: 3
    class-runs-per-level: 4
    # Floor completion XP
    floor-completion-xp:
      entrance: 10
      floor-1: 10
      floor-2: 20
      floor-3: 20
      floor-4: 20
      floor-5: 30
      floor-6: 30
      floor-7: 30
      master-1: 50
      master-2: 50
      master-3: 50
      master-4: 50
      master-5: 50
      master-6: 50
      master-7: 50
    # One-time dungeon objective XP (Skyblock guide style)
    objective-xp:
      first-s-rank: 20
      first-a-rank: 10
      score-200: 5
      score-250: 10
      score-300: 15
  
  # Bestiary (Skyblock-accurate)
  # +1 XP per Family Tier, +10 XP every 10 Milestones
  bestiary:
    family-tier-xp: 1
    milestone-xp: 10
    milestone-every-kills: 10
  
  # Slayer XP rewards (Skyblock-accurate)
  # Each slayer level grants Skyblock XP when reached
  slayer:
    level-rewards:
      1: 15
      2: 25
      3: 35
      4: 50
      5: 75
      6: 100
      7: 125
      8: 150
      9: 150
  
  # Base XP per Skyblock level (Skyblock-accurate)
  # Each Skyblock Level requires exactly 100 XP on Skyblock
  # Total available XP: ~48,416 XP (allows reaching approximately level 484)
  # Note: Level 521 requires additional XP from unlimited sources (Magical Power, Pet Score updates)
  xp-per-level: 100
  
