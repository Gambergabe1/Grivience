# General Settings
settings:
  # Enable auto-save for storage data
  auto-save: true
  # Auto-save interval in ticks (20 ticks = 1 second)
  auto-save-interval: 600
  # Enable storage locking feature
  allow-locking: true
  # Enable custom naming of storage
  allow-naming: true
  # Maximum storage usage percentage before warning (0-100)
  usage-warning-threshold: 90
  # Enable storage leaderboard
  enable-leaderboard: true
  # Enable storage upgrade notifications
  enable-upgrade-notifications: true
